 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Admin Login | DTS 204 CBT</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      padding: 36px 28px;
      text-align: center;
    }
    .login-card h2 {
      font-family: 'Playfair Display', serif;
      color: #0d1b3e;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #dde4f0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      margin: 16px 0 12px;
    }
    input:focus {
      border-color: #0d1b3e;
      box-shadow: 0 0 0 3px rgba(13,27,62,0.1);
    }
    .btn {
      width: 100%;
      background: #132348;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: #0d1b3e; }
    .error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .error.show { display: block; }
    .back-link {
      display: block;
      margin-top: 18px;
      color: #64748b;
      font-size: 14px;
      text-decoration: none;
    }
    .back-link:hover { color: #132348; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Admin Access</h2>
    <p style="color: #64748b; margin-bottom: 12px;">Enter Admin ID</p>
    <input type="text" id="adminId" placeholder="Admin ID" autocomplete="off" />
    <div class="error" id="errorMsg">Invalid Admin ID. Access denied.</div>
    <button class="btn" id="loginBtn">Login</button>
    <a href="login.html" class="back-link">Back to Student Login</a>
  </div>

  <script>
    const VALID_ADMIN_ID = "Admin/DTS204/2026";

    document.getElementById('loginBtn').addEventListener('click', () => {
      const input = document.getElementById('adminId').value.trim();
      const errorDiv = document.getElementById('errorMsg');
      if (input === VALID_ADMIN_ID) {
        sessionStorage.setItem('admin_logged_in', 'true');
        window.location.href = 'admin.html';    
      } else {
        errorDiv.classList.add('show');
        document.getElementById('adminId').style.borderColor = '#dc2626';
      }
    });

    document.getElementById('adminId').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
      }
    });

    // Reset error on input
    document.getElementById('adminId').addEventListener('input', () => {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('adminId').style.borderColor = '';
    });
  </script>
</body>
</html>
